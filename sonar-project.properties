sonar.projectKey=smart-quiz-platform
sonar.projectName=Smart Quiz Platform
sonar.projectVersion=1.0

sonar.sources=client/src,server/src,server/index.js
sonar.sourceEncoding=UTF-8

sonar.exclusions=**/node_modules/**,**/.next/**,**/coverage/**,**/dist/**,**/build/**,**/out/**,client/public/**
sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx
sonar.coverage.exclusions=**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx,client/src/components/ui/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info,client/coverage/lcov.info,server/coverage/lcov.info
